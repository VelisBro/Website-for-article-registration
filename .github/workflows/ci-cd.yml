name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
      SESSION_SECRET: ci-session-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ChangeMeAdmin123!
      ADMIN_DISPLAY_NAME: Administrator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run ci:verify

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DEPLOY_WEBHOOK_URL != ''
    steps:
      - name: Trigger deployment webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
            -d "{\"sha\":\"${GIT_SHA}\",\"ref\":\"${GIT_REF}\"}" \
            "${DEPLOY_WEBHOOK_URL}"
